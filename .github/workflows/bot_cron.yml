name: Fixed 1-Hour OmniSync Bot

on:
  workflow_dispatch:          # গিটহাব ড্যাশবোর্ড থেকে ম্যানুয়ালি রান করার বাটন সচল রাখবে
  repository_dispatch:        # cron-job.org থেকে রিমোট ট্রিগার সচল রাখবে
    types: [run-sync]

permissions:
  contents: write

jobs:
  run-sync-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          pip install telethon requests feedparser "yt-dlp[default]" quickjs beautifulsoup4

      - name: Execute OmniSync Master Engine
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          FB_TOKEN: ${{ secrets.FB_TOKEN }}
        run: python run_on_github.py

      - name: Commit & Save Sync Progress State
        run: |
          git config --local user.email "engine@omnisync.io"
          git config --local user.name "OmniSync Master Engine"
          git add bot_memory.json
          git commit -m "Auto-Update: Visual & Multi-Output checkpoint [skip-ci]" || echo "No new updates to save"
          git push
